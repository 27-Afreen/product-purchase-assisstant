    <text x="645" y="205" text-anchor="middle" fill="#93c5fd" font-size="17" font-weight="800">Flask Backend: app.py</text>
    <rect x="475" y="245" width="340" height="72" rx="14" fill="url(#blue)" stroke="#67e8f9"/>
    <text x="645" y="276" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="800">Routes / Controllers</text>
    <text x="645" y="299" text-anchor="middle" fill="#dbeafe" font-size="13">/auth, /chat, /image-search, /api/chats</text>
    <rect x="475" y="360" width="150" height="88" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
