    <rect x="105" y="295" width="210" height="92" rx="14" fill="#102650" stroke="#2563eb"/>
    <text x="210" y="329" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">index.html</text>
    <text x="210" y="356" text-anchor="middle" fill="#94a3b8" font-size="13">Login page + chatbot UI</text>
    <rect x="105" y="440" width="210" height="92" rx="14" fill="#102650" stroke="#2563eb"/>
    <text x="210" y="474" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Vanilla JS</text>
    <text x="210" y="501" text-anchor="middle" fill="#94a3b8" font-size="13">Fetch APIs, render cards</text>
    <rect x="105" y="585" width="210" height="92" rx="14" fill="#102650" stroke="#2563eb"/>
