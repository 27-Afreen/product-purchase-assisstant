    <text x="550" y="418" text-anchor="middle" fill="#94a3b8" font-size="13">PBKDF2, sessions</text>
    <rect x="665" y="360" width="150" height="88" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="740" y="393" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="800">History</text>
