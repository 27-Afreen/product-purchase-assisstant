    <rect x="475" y="500" width="150" height="88" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="550" y="533" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="800">Chat Logic</text>
    <text x="550" y="558" text-anchor="middle" fill="#94a3b8" font-size="13">Prompt + search tags</text>
