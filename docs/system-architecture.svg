    <text x="740" y="533" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="800">Image Logic</text>
    <text x="740" y="558" text-anchor="middle" fill="#94a3b8" font-size="13">Vision + query variants</text>
    <rect x="520" y="645" width="250" height="92" rx="14" fill="#102650" stroke="#2563eb"/>
    <text x="645" y="680" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Search + Ranking</text>
    <text x="645" y="707" text-anchor="middle" fill="#93c5fd" font-size="13">Store filtering, dedupe, scoring</text>

    <rect x="935" y="210" width="190" height="165" rx="18" fill="#0b1628" stroke="#1e3a8a"/>
    <text x="1030" y="250" text-anchor="middle" fill="#93c5fd" font-size="17" font-weight="800">SQLite</text>
    <text x="1030" y="286" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">wisebuy.db</text>
    <text x="1030" y="318" text-anchor="middle" fill="#94a3b8" font-size="13">users</text>
    <text x="1030" y="340" text-anchor="middle" fill="#94a3b8" font-size="13">chats, messages</text>
    <text x="1030" y="362" text-anchor="middle" fill="#94a3b8" font-size="13">result_sets, reset tokens</text>

    <rect x="935" y="455" width="365" height="350" rx="18" fill="#0b1628" stroke="#334155"/>
    <text x="1118" y="496" text-anchor="middle" fill="#93c5fd" font-size="17" font-weight="800">External Services</text>
    <rect x="975" y="535" width="130" height="72" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="1040" y="564" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="800">Groq</text>
    <text x="1040" y="587" text-anchor="middle" fill="#94a3b8" font-size="12">LLM + vision</text>
    <rect x="1130" y="535" width="130" height="72" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="1195" y="564" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="800">SMTP</text>
    <text x="1195" y="587" text-anchor="middle" fill="#94a3b8" font-size="12">Recovery email</text>
    <rect x="975" y="650" width="130" height="72" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="1040" y="679" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="800">Amazon API</text>
    <text x="1040" y="702" text-anchor="middle" fill="#94a3b8" font-size="12">RapidAPI</text>
    <rect x="1130" y="650" width="130" height="72" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="1195" y="679" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="800">Walmart API</text>
    <text x="1195" y="702" text-anchor="middle" fill="#94a3b8" font-size="12">OpenWebNinja</text>
    <rect x="1052" y="750" width="130" height="72" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="1117" y="779" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="800">DistilBERT</text>
    <text x="1117" y="802" text-anchor="middle" fill="#94a3b8" font-size="12">Sentiment score</text>
  </g>

  <g stroke="#60a5fa" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M315 341 H475"/>
    <path d="M315 486 H475"/>
    <path d="M815 281 H935"/>
    <path d="M625 404 H665"/>
    <path d="M625 544 H665"/>
    <path d="M645 588 V645"/>
    <path d="M770 691 C860 691 860 332 935 332"/>
    <path d="M770 691 H975"/>
    <path d="M770 691 C875 691 875 571 975 571"/>
    <path d="M770 691 C890 691 890 786 1052 786"/>
    <path d="M625 404 C875 404 875 571 975 571"/>
    <path d="M550 448 V500"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="430" y="870" width="430" height="48" rx="24" fill="#0b1628" stroke="#334155"/>
    <text x="645" y="901" text-anchor="middle" fill="#94a3b8" font-size="14">Architecture style: layered Flask monolith</text>
  </g>
