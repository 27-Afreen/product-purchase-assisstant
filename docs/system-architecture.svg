<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101f"/>
      <stop offset="1" stop-color="#101b33"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="1400" height="980" rx="34" fill="url(#bg)"/>
  <circle cx="180" cy="150" r="145" fill="#0ea5e9" opacity="0.10"/>
  <circle cx="1180" cy="780" r="210" fill="#2563eb" opacity="0.09"/>

  <text x="70" y="82" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">WiseBuy AI System Architecture</text>
  <text x="70" y="121" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Layered Flask monolith with vanilla JS frontend, SQLite persistence, and external AI/marketplace APIs</text>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="210" width="280" height="575" rx="18" fill="#0b1628" stroke="#1e3a8a"/>
