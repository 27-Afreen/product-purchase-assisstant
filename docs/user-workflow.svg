<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101f"/>
      <stop offset="1" stop-color="#0b1730"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="1400" height="980" rx="34" fill="url(#bg)"/>
  <circle cx="210" cy="125" r="120" fill="#0ea5e9" opacity="0.10"/>
  <circle cx="1215" cy="170" r="165" fill="#2563eb" opacity="0.10"/>

  <text x="70" y="82" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">WiseBuy AI User Workflow</text>
  <text x="70" y="121" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Login or guest entry, product search, comparison, and saved chat history</text>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="80" y="185" width="250" height="88" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="205" y="221" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Page Loads</text>
    <text x="205" y="248" text-anchor="middle" fill="#93c5fd" font-size="14">Fresh start screen</text>

    <rect x="455" y="185" width="300" height="88" rx="14" fill="#102650" stroke="#2563eb"/>
    <text x="605" y="221" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Login Page</text>
    <text x="605" y="248" text-anchor="middle" fill="#93c5fd" font-size="14">Sign in, create account, or guest</text>

    <rect x="870" y="120" width="260" height="76" rx="14" fill="#0f213d" stroke="#334155"/>
    <text x="1000" y="151" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Create Account</text>
    <text x="1000" y="174" text-anchor="middle" fill="#94a3b8" font-size="13">Email + password</text>

    <rect x="870" y="225" width="260" height="76" rx="14" fill="#0f213d" stroke="#334155"/>
    <text x="1000" y="256" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Login</text>
    <text x="1000" y="279" text-anchor="middle" fill="#94a3b8" font-size="13">Session is created</text>

    <rect x="870" y="330" width="260" height="76" rx="14" fill="#0f213d" stroke="#334155"/>
    <text x="1000" y="361" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Continue as Guest</text>
    <text x="1000" y="384" text-anchor="middle" fill="#94a3b8" font-size="13">Temporary searches</text>

    <rect x="1175" y="225" width="160" height="76" rx="14" fill="url(#blue)" stroke="#67e8f9"/>
    <text x="1255" y="257" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="800">Main Chat</text>
    <text x="1255" y="280" text-anchor="middle" fill="#dbeafe" font-size="13">Chatbot opens</text>

    <rect x="165" y="450" width="250" height="86" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="290" y="484" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Text Search</text>
    <text x="290" y="510" text-anchor="middle" fill="#94a3b8" font-size="14">User describes product</text>

    <rect x="515" y="450" width="250" height="86" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="640" y="484" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Image Search</text>
    <text x="640" y="510" text-anchor="middle" fill="#94a3b8" font-size="14">Upload product photo</text>

    <rect x="865" y="450" width="260" height="86" rx="14" fill="#102650" stroke="#2563eb"/>
    <text x="995" y="484" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Search Intent</text>
    <text x="995" y="510" text-anchor="middle" fill="#93c5fd" font-size="14">Both sites or one specific site</text>

    <rect x="220" y="665" width="260" height="86" rx="14" fill="#0f213d" stroke="#334155"/>
    <text x="350" y="699" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Amazon Results</text>
    <text x="350" y="725" text-anchor="middle" fill="#94a3b8" font-size="14">Product adapter</text>

    <rect x="570" y="665" width="260" height="86" rx="14" fill="#0f213d" stroke="#334155"/>
    <text x="700" y="699" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Walmart Results</text>
    <text x="700" y="725" text-anchor="middle" fill="#94a3b8" font-size="14">Product adapter</text>

    <rect x="920" y="665" width="260" height="86" rx="14" fill="#102650" stroke="#2563eb"/>
    <text x="1050" y="699" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Compare + Rank</text>
    <text x="1050" y="725" text-anchor="middle" fill="#93c5fd" font-size="14">Price, rating, relevance, sentiment</text>

    <rect x="420" y="835" width="270" height="82" rx="14" fill="url(#blue)" stroke="#67e8f9"/>
    <text x="555" y="868" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">Recommendation</text>
    <text x="555" y="894" text-anchor="middle" fill="#dbeafe" font-size="14">Best product card shown</text>

    <rect x="780" y="835" width="270" height="82" rx="14" fill="#0f213d" stroke="#1e3a8a"/>
    <text x="915" y="868" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="800">Saved History</text>
    <text x="915" y="894" text-anchor="middle" fill="#94a3b8" font-size="14">Only for logged-in users</text>
  </g>

  <g stroke="#60a5fa" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M330 229 H455"/>
    <path d="M755 229 H850"/>
    <path d="M1130 263 H1175"/>
    <path d="M1130 158 C1190 158 1190 225 1230 225"/>
    <path d="M1130 368 C1195 368 1195 301 1230 301"/>
    <path d="M1255 301 V420 C1255 493 1160 493 1125 493"/>
    <path d="M415 493 H515"/>
    <path d="M765 493 H865"/>
    <path d="M995 536 C995 610 350 610 350 665"/>
    <path d="M995 536 C995 610 700 610 700 665"/>
    <path d="M830 708 H920"/>
    <path d="M480 708 H570"/>
    <path d="M1050 751 C1050 820 690 820 630 835"/>
    <path d="M690 876 H780"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="910" y="570" width="300" height="42" rx="21" fill="#0b1628" stroke="#334155"/>
    <text x="1060" y="597" text-anchor="middle" fill="#94a3b8" font-size="14">Specific site request skips the other site</text>
  </g>
</svg>
